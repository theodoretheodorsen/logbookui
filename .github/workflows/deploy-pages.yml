name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # web/ becomes the site root, but web/js/logbook-api.js imports the
      # shared lib/ (repo root, sibling of web/) via a relative path that
      # expects it one level up from the site root - so lib/ needs to be
      # copied in as a sibling of web/'s own contents before upload.
      - name: Assemble site (web/ + lib/)
        run: |
          mkdir _site
          cp -r web/. _site/
          cp -r lib _site/lib
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
